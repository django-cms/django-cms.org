{% load cms_tags %}
<div {% if not instance.space_device or instance.space_device == "xs" %}
        class="{{ instance.space_property }}{{ instance.space_sides }}-{{ instance.space_size }}"
    {% else %}
        class="{{ instance.space_property }}{{ instance.space_sides }}-{{ instance.space_device }}-{{ instance.space_size }}"
    {% endif %}>
    {% for child in instance.child_plugin_instances %}
        {% render_plugin child %}
    {% endfor %}
</div>
