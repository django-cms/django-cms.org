{% load thumbnail frontend l10n %}
{% if picture_link %}
    <a href="{{ picture_link }}"
        {% if instance.target %} target="{{ instance.target }}"{% endif %}
        {% get_attributes instance.link_attributes %}>
{% endif %}
    <div>
        <svg viewBox="0 0 1300 1124" style="width: 100%;" {{ instance.get_attributes }}>
        <defs>
            <clipPath id="clip-shape-{{ instance.pk|unlocalize }}" clipPathUnits="userSpaceOnUse">
            <path d="
                M 294 114
                L 294 30 Q 294 0 324 0
                L 1269 0 Q 1299 0 1299 30
                L 1299 1093 Q 1299 1123 1269 1123
                L 324 1123 Q 294 1123 294 1093
                L 294 858
                L 30 858 Q 0 858 0 828
                L 0 144 Q 0 114 30 114
                L 294 114 Z
            "/>
            </clipPath>
        </defs>

        <image 
            href="{{ instance.img_src }}"
            width="1300"
            height="1124"
            clip-path="url(#clip-shape-{{ instance.pk|unlocalize }})"
            preserveAspectRatio="xMidYMid slice"
        />
    </svg>
    </div>
{% if picture_link %}
    </a>
{% endif %}
