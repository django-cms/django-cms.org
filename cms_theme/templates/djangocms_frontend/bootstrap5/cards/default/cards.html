<!-- cms_theme/templates/benefits/benefits_panel.html -->
{% load static cms_tags frontend %}
<div {% if instance.background_grid %}class="{{ instance.get_classes }}  background-grid"{% endif %} {{ instance.get_attributes }}>
    <div class="container">
        {% if instance.heading %}
            {% if instance.overline %}
                <p class="overline {% if instance.heading_context %}text-{{ instance.heading_context }} {% endif %}text-{{ instance.heading_alignment }}">{% inline_field instance "overline" %}</p>
            {% endif %}
            <h2 class="pb-5 mt-3 {% if instance.heading_context %}text-{{ instance.heading_context }} {% endif %}text-{{ instance.heading_alignment }}">{% inline_field instance "heading" %}</h2>
        {% endif %}
        <div class="row g-4 justify-content-center row-cols-1
            {% if instance.grid_columns == '2' %} row-cols-lg-2
            {% elif instance.grid_columns == '3' %} row-cols-md-2 row-cols-lg-3
            {% elif instance.grid_columns|default:'4' == '4' %} row-cols-md-2 row-cols-lg-4{% endif %}
        ">
            {% for plugin in instance.child_plugin_instances %}
                {% render_plugin plugin %}
            {% endfor %}
        </div>
    </div>
</div>
